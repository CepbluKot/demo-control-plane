name: llm-summary-test-infra

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: llm-summary-clickhouse
    environment:
      CLICKHOUSE_DB: summary_test
      CLICKHOUSE_USER: ${SUMMARY_TEST_CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${SUMMARY_TEST_CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${SUMMARY_TEST_CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${SUMMARY_TEST_CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "clickhouse-client --user \"$${CLICKHOUSE_USER:-default}\" --password \"$${CLICKHOUSE_PASSWORD:-}\" --query 'SELECT 1' >/dev/null",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: llm-summary-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${SUMMARY_TEST_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

volumes:
  clickhouse_data:
  redis_data:
