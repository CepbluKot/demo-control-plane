apiVersion: v1
kind: Secret
metadata:
  name: {{ include "log-summarizer.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "log-summarizer.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_API_BASE: {{ .Values.llm.apiBase | quote }}
  LLM_API_KEY:  {{ .Values.llm.apiKey  | quote }}
  LLM_MODEL:    {{ .Values.llm.model   | quote }}
  CH_HOST:      {{ .Values.clickhouse.host     | quote }}
  CH_PORT:      {{ .Values.clickhouse.port     | quote }}
  CH_USER:      {{ .Values.clickhouse.user     | quote }}
  CH_PASSWORD:  {{ .Values.clickhouse.password | quote }}
  CH_DATABASE:  {{ .Values.clickhouse.database | quote }}
